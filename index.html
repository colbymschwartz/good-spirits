  id: "glassware",
  name: "Glassware",
  icon: "🥃",
  summary: "The vessel shapes that affect aroma, temperature, presentation, and even flavor perception—glass choice is a technical decision, not an aesthetic afterthought.",
  content: "Your choice of glassware is not primarily decorative—it's functional and directly affects how the drink tastes and how the drinker experiences it. The shape of the glass determines how aromas concentrate before reaching your nose, how long the drink stays cold, how the liquid feels in your mouth, and how the visual presentation communicates what you're about to drink.\n\nThe rocks glass (also called an Old Fashioned glass) is a short, wide-mouth vessel, usually holding 6-8 ounces, designed for spirit-forward drinks served over ice. The wide mouth allows for easy drinking and for garnish presentation (expressed peels, citrus wheels). The heaviness of proper rocks glassware (at least 4mm thick) maintains temperature and suggests quality. Spirit-forward cocktails like Old Fashioneds, Negronis, and Sazeracs belong in rocks glasses; they have no business in anything else.\n\nThe coupe (or champagne coupe) is a vintage-style glass with a broad, shallow bowl, traditionally holding 4-6 ounces. These are the glasses you see in 1920s cocktail photos, and they remain the gold standard for shaken, strained cocktails like Daiquiris, Sidecars, and Sours. The shallow bowl allows you to see the drink clearly and drink without spilling, and it concentrates aromas upward toward your nose. A chilled coupe glass transforms the drinking experience; a warm coupe glass ruins it. Always pre-chill coupe glasses in the freezer.\n\nThe Nick & Nora glass is a smaller, slightly more tapered coupe, holding about 4 ounces, that's become popular in craft bars for spirit-forward drinks and pre-Prohibition cocktails. It's elegant, it concentrates aroma beautifully, and it's becoming the modern standard for high-end home bars. If you're going to buy new glassware, Nick & Nora glasses are a better investment than coupes because they're more versatile and look more sophisticated.\n\nThe highball glass is a tall, straight-sided vessel, usually 8-10 ounces, designed for spirit-and-mixer drinks like Gin & Tonics, Dark 'n' Stormys, and Whiskey Sodas. The tall format emphasizes the refreshing, long-drink nature of these cocktails and allows for a large ice cube and plenty of mixer. The straight sides make it easy to drink and easy to see through to the clarity of the drink.\n\nThe Collins glass is similar to the highball but slightly larger (12-14 ounces), traditionally used for drinks like Tom Collins and John Collins. The distinction is mainly historical; modern bartenders often use the terms interchangeably, though purists argue that Collinses belong in Collins glasses because of the extra volume for ingredient distribution.\n\nThe martini glass (also called a cocktail glass) is the most iconic glassware in cocktail history, instantly recognizable by its inverted cone shape and stem. The stem is designed to keep your hand off the bowl, preventing body heat from warming the drink, and the cone shape concentrates aroma toward your nose while preventing ice from falling into the drink (since martinis and similar drinks are strained, not served over ice). That said, many modern bartenders are moving away from martini glasses for martinis because they're difficult to drink from without spilling, they're fragile, and they're hard to keep cold. Some prefer Nick & Nora glasses or even coupes for martinis, a heresy to traditionalists but a practical choice for home bartenders.\n\nThe tiki mug is a category unto itself: decorative, often ceramic or resin, often shaped like a face or tropical animal, designed for tropical rum cocktails and frozen drinks. Tiki mugs serve multiple purposes: they're visually distinctive, they're fun, they're often insulating (which actually keeps frozen drinks colder longer), and they communicate the playful, escapist nature of tiki culture. A proper Tiki Mai Tai or Zombie belongs in a tiki mug; it's not optional, it's part of the experience.\n\nThe copper mug (Moscow Mule mug) is traditionally used for the Moscow Mule, holding about 12-16 ounces and made from pure copper, which conducts cold extremely well. The problem with copper mugs is that they're impractical—pure copper reacts with acidic ingredients like citrus and ginger, so you can't put certain cocktails in them without creating a chemical reaction. Most bars now use copper-plated mugs with a nickel or stainless steel interior, which solves the problem but loses some of the aesthetic impact.\n\nThe Irish coffee mug is a short, wide glass handle with a broad bowl, designed for hot cocktails like Irish Coffee. The glass is sturdy enough to handle hot liquid, the handle prevents your hand from touching the hot glass, and the shape is wide enough to pour whipped cream onto the top.\n\nThe snifter is a large, rounded glass with a narrow opening, traditionally used for brandy, cognac, and aged spirits. For cocktails, snifters are used for spirit-forward, slowly-sipped drinks where aroma concentration and the appearance of luxury matter. A cocktail in a snifter communicates sophistication and deliberation.\n\nThe flute is a tall, narrow glass designed for champagne and sparkling cocktails, holding 6-8 ounces. The narrow opening concentrates bubbles and aroma upward; the tall format showcases the visual appeal of sparkling wine and sparkly cocktails.\n\nAll of these glasses matter because they're doing real work: they're controlling temperature, concentrating aroma, preventing spillage, and communicating the style and seriousness of the drink. Drinking a Martini from a highball glass would be technically possible but aesthetically wrong and would affect how the drink tastes because the aroma wouldn't concentrate properly. Glassware is not an afterthought.",
  tips: ["Rocks glasses for spirit-forward drinks (Negroni, Old Fashioned, Sazerac)—always one large cube of ice", "Coupe or Nick & Nora glasses for shaken, strained cocktails—pre-chill these glasses without fail", "Highball glasses for spirit-and-mixer drinks (G&T, Whiskey Soda)—these can be smaller or larger depending on the drink", "Tiki mugs for tropical rum cocktails—the visual presentation is part of the experience", "The stem on martini glasses serves a purpose (keeping your hand off the bowl), but Nick & Nora glasses are now the modern standard for martinis because they're easier to drink from"],
  usedIn: ["all"]
}, {
  id: "dilution-science",
  name: "Dilution Science",
  icon: "💧",
  summary: "Understanding what dilution actually does to a cocktail and how to calculate and control it for consistent, balanced drinks.",
  content: "Dilution is the most misunderstood element of cocktail craft. Many home bartenders treat it as something to minimize, as if water in a cocktail is a contaminant rather than an essential ingredient. This is fundamentally wrong. Proper dilution is what transforms a sharp, burning combination of spirits and bitters into something silky, integrated, and balanced. Understanding dilution is the difference between making bad cocktails and making great ones.\n\nLet's start with what dilution actually does. Water, absorbed into a cocktail through melting ice, does three critical things: it cools the drink from mouth-burning temperature down to something you can sip, it opens up the aromatic compounds in the spirits so you can smell and taste them fully, and it reduces the viscosity of pure spirits, allowing flavors to meld and balance to emerge. An underdiluted cocktail—one with less than 15 percent water by volume—tastes sharp, burning, and unbalanced. The individual components (gin, vermouth, bitters) don't integrate; they fight each other. An overdiluted cocktail—one with more than 30 percent water by volume—tastes thin and watery, the complexity flattens, and the alcohol punch disappears. The target zone for most cocktails is 18-25 percent dilution by volume.\n\nHow do you calculate this? If you're making a drink with 2 ounces of spirits and you stir or shake it properly, you're aiming for about 0.5 ounces of added water (22.5 percent dilution). If you're making a 3-ounce drink, you're aiming for about 0.75 ounces of water. These aren't precise rules; they're guidelines. Different spirits have different flavor profiles that respond differently to dilution. A heavily spiced rum might want 20 percent dilution; a delicate dry vermouth might want 25 percent. Experience teaches you to feel the difference.\n\nThe technique that delivers dilution also matters tremendously. Stirring, because it's slow and controlled, creates dilution that feels smooth and integrated. The ice melts gradually, the water incorporates slowly into the spirits, and flavors develop together. Shaking, because it's violent and rapid, creates more total dilution in less time but also creates more aeration. A properly shaken cocktail gets about the same dilution percentage as a properly stirred cocktail (18-25 percent), but because the shaking is more aggressive, it feels lighter and more integrated—the vigorous action breaks down fat molecules and proteins, allowing the flavors to distribute differently than in a stirred drink.\n\nPre-batching changes the dilution equation entirely. If you're making a batched cocktail (say, a batch of 20 Negronis for a dinner party), you'll stir the batch once to chill it and dilute it, then you can serve each drink from that batch at room temperature without additional dilution. This means you need to calculate your dilution percentage and add water intentionally to the batch before serving, because you won't be adding ice to individual drinks. The formula is roughly 20 percent of your total spirit volume as water. So for 16 ounces of spirits (enough for 8 cocktails), you'd add about 3.2 ounces of water to the batch. Some bartenders instead stir the entire batch over ice to reach their target dilution, then strain into a vessel and chill down to serving temperature.\n\nOne final consideration: different drinking paces create different final dilutions. A cocktail consumed immediately after preparation will have less total dilution than the same cocktail consumed 10 minutes later, after the ice has continued melting. Understanding this helps you design drinks that remain balanced throughout the drinking experience. A spirit-forward cocktail with one large cube of ice stays balanced for a long time because the ice melts slowly. The same cocktail made with standard ice cubes will become progressively more watered down as you drink. This is why ice choice and dilution strategy are inseparable decisions.",
  tips: ["Target 18-25 percent dilution for most cocktails—roughly 0.5 ounces of water per 2 ounces of spirits", "Underdiluted cocktails taste burning and unbalanced; overdiluted cocktails taste thin and weak", "Stirred cocktails feel more integrated because dilution happens slowly; shaken cocktails feel lighter because of aeration", "For pre-batched cocktails, add about 20 percent water by volume to your spirits and bitters, then chill", "Large ice melts slowly, keeping your drink balanced throughout the drinking experience; small ice dilutes your drink progressively"],
  usedIn: ["all"]
}, {
  id: "bitters",
  name: "Bitters",
  icon: "🌿",
  summary: "Bitter herbal tinctures that function as seasoning for cocktails, adding depth, complexity, and balance just like salt in cooking.",
  content: "Bitters are the salt and pepper of cocktails, and like salt and pepper, they're essential to understanding how to season a drink properly. Bitters are herbal tinctures made from bitter herbs, spices, roots, and barks, steeped in high-proof spirits. They're intensely flavored and potent—a single dash of Angostura bitters can transform a drink from flat and one-dimensional into something with depth and complexity. Yet many home bartenders treat bitters as optional or use them incorrectly.\n\nLet's start with how bitters actually work. In cooking, salt doesn't make food taste salty—it enhances and brings out existing flavors, adding roundness and integration. Bitters work exactly the same way in cocktails. When you add a dash or two of Angostura to an Old Fashioned, the bitters aren't making the drink taste bitter; they're adding spice, warmth, and complexity that makes the whiskey and sugar sing. The traditional recipe for an Old Fashioned calls for \"a dash of bitters\"—roughly 3-5 dashes—and this is the seasoning that makes the drink what it is. Without bitters, an Old Fashioned is just whiskey and sugar in a glass.\n\nAngostura bitters are the most common and most recognizable, with their distinctive yellow label. They're made from a blend of 38 herbs and spices (the exact recipe is secret) and have flavors of spice, citrus, and herbal notes. Angostura is the default choice for spirit-forward cocktails like Old Fashioneds, Negronis, and Sazeracs, and for this reason every home bartender should have a bottle.\n\nPeychaud's bitters are another classic, made in New Orleans and featuring a distinctive flavor profile of anise and spice. Peychaud's is the traditional choice for Sazeracs (though some add both Peychaud's and Angostura) and for Creole-style cocktails. The flavor is slightly lighter and more delicate than Angostura, making it useful when you want to add complexity without adding weight.\n\nOrange bitters add citrus and herbal notes without the spice that Angostura brings. They work beautifully in gin cocktails, in Martinis (instead of traditional recipes that don't use bitters), and in spirit-forward drinks where you want aromatic brightness rather than spice. Regan's Orange Bitters are a classic brand, though many craft producers now make excellent versions.\n\nBeyond these three standard categories, the bitters world has exploded with specialty options: chocolate bitters for dessert cocktails, celery bitters for vegetable-forward drinks (Bloody Marys), cardamom bitters for spiced drinks, walnut bitters for darker cocktails. These specialty bitters are fun to experiment with, but they're not essential. Master the three classics first.\n\nOne common mistake is underdashing your cocktails. The minimum is usually 2-3 dashes per drink; most classic cocktails call for 3-5. A dash from a traditional bottle is roughly 1/8 teaspoon. If your bottle has a dasher cap, you know what a dash is. If not, use a dropper or a small spoon—roughly 1/8 teaspoon per dash. Another mistake is adding bitters after straining your cocktail into the glass. This is wrong. Bitters need to be stirred or shaken with the other ingredients so they distribute evenly throughout the drink. Add them to your mixing glass or shaker before adding the base spirit and ice, so they integrate during the dilution process.\n\nMaking your own bitters is easier than you'd think and is a worthwhile project for serious home bartenders. You'll need high-proof spirits (190-proof grain alcohol is ideal, but 100-proof vodka works), dried herbs and spices (you can buy these from any spice supplier), jars, and patience. Roughly, you'd combine your spirits with your herbs and spices in a jar, let them infuse for 1-3 weeks, then strain and bottle. A simple starter bitters might be Angostura-style (using a blend of gentian root, cardamom, clove, cinnamon, and orange peel), but the formulations are nearly limitless. Homemade bitters also make excellent gifts for fellow cocktail enthusiasts.",
  tips: ["Angostura bitters are essential for any home bar—they're the salt and pepper of cocktails", "Always add bitters to your mixing glass or shaker before other ingredients so they distribute evenly", "Most cocktails call for 2-5 dashes of bitters; if a recipe doesn't specify, start with 2 and taste as you go", "Orange bitters are a great second bottle for gin cocktails and for adding brightness to spirit-forward drinks", "Peychaud's bitters are the traditional choice for Sazeracs and for Creole-influenced cocktails"],
  usedIn: ["classic", "spirit-forward", "complex"]
}, {
  id: "syrups-sweeteners",
  name: "Simple Syrups & Sweeteners",
  icon: "🍯",
  summary: "Understanding how different sweetening agents—from simple syrup to orgeat—affect a cocktail's body, texture, and flavor profile.",
  content: "Sweeteners are far more than just sugar in a glass. The choice of sweetening agent directly affects how a drink tastes, how it feels in your mouth, how it balances with other ingredients, and how it ages if you're batching or storing cocktails. Many home bartenders treat all sweeteners as interchangeable, which is a mistake. The difference between a cocktail sweetened with simple syrup and one sweetened with honey syrup or agave is profound.\n\nLet's start with simple syrup—the foundation of most cocktails. The classic ratio is 1:1 (one part sugar to one part water by weight), which dissolves quickly and creates a thin, light sweetness. A 1:1 simple syrup is what most bartenders use and what most classic recipes call for. Rich simple syrup, the 2:1 ratio (two parts sugar to one part water by weight), creates a thicker, more viscous syrup with deeper sweetness and more body. Rich simple syrup is often used in spirit-forward cocktails or in drinks where you want the sweetness to coat your mouth slightly, like in a Pisco Sour. The difference in texture and flavor between 1:1 and 2:1 syrup is noticeable—1:1 is delicate and fresh, 2:1 is richer and more integrated.\n\nMaking simple syrup at home is trivially easy: combine your sugar and water (by weight, not by volume—use a kitchen scale), heat gently until the sugar dissolves, then let it cool. You can make it in bulk and store it in the refrigerator for weeks. Some bartenders add a tiny pinch of salt to simple syrup—roughly 1/8 teaspoon per cup—which actually enhances the perception of sweetness (salt does this in cooking, and it works the same way in cocktails).\n\nHoney syrup adds complexity and body that simple syrup can't match. The honey flavor integrates beautifully with spirits and creates a drinks that feels richer and more luxurious. A simple honey syrup is a 1:1 ratio of honey to water by weight—combine them in a pot over low heat, stir until fully combined, then cool. Honey syrup is perfect for Whiskey Sours, Daiquiris, or any sour-style cocktail where you want that extra richness. The downside is that honey syrup can crystallize or ferment if not stored properly, so you'll want to keep it in the refrigerator and replace it more frequently than simple syrup.\n\nAgave syrup is similarly rich and adds a subtle sweetness that's less aggressive than table sugar. Agave nectar is the filtered juice from the agave plant, and it's lighter in body than honey but richer than simple syrup. It works beautifully in tequila cocktails because the flavors align—agave-based spirits naturally pair with agave sweetness. The syrup ratio is typically 1:1, though agave nectar is liquid to begin with so you're really just thinning it slightly with water if you want a thinner consistency.\n\nDemerara syrup adds a subtle molasses note and slight caramel quality, perfect for spirit-forward drinks or tropical cocktails. Demerara sugar is unrefined and has molasses notes that simple syrup doesn't. The ratio is 2:1 (demerara to water by weight) to account for the subtlety of the flavor; if you use 1:1, the sweetness overwhelms the nuance. Demerara syrup is particularly beautiful in Old Fashioneds or in tropical rum drinks where the molasses notes align with the flavor profile.\n\nOrgeat is a whole different category—an almond-based syrup traditionally used in Sours and in tiki culture. Real orgeat is made from ground almonds, water, and sugar, and it's thick, creamy, and complex. Many bartenders buy orgeat premade (brands like Torani or BG Reynolds make solid versions), but making your own is worthwhile because the flavor is superior. A basic homemade orgeat involves steeping sliced almonds in water overnight, then blending and straining to create almond milk, then combining with sugar and a touch of almond extract (optional). Orgeat adds richness and a subtle nuttiness that elevates a Whiskey Sour or Daiquiri to something special.\n\nGrenadine is another significant category—the sweetening agent in many classic cocktails and in tiki drinks. Real grenadine is made from pomegranate juice and sugar; cheap grenadine is high-fructose corn syrup with red food coloring and pomegranate flavoring. The difference in a Negroni or Tiki drink is night and day. You can buy quality bottled grenadine (Monin or Pommery make good versions), or you can make your own by reducing pomegranate juice by half and adding equal parts sugar. Homemade grenadine is fresher and more complex, though it doesn't keep as long as bottled versions.\n\nCinnamon syrup, vanilla syrup, maple syrup—the possibilities expand infinitely once you understand the basic technique of dissolving sugar in water and infusing flavor. The principle is always the same: sweeten to balance the cocktail, choose the sweetening agent strategically to add flavor and body, and understand that sweetness is just one tool in your flavor-balancing toolkit.\n\nOne final consideration: how sweetener choice affects aging and storage. Simple syrup is stable indefinitely. Honey syrup and syrups with fresh ingredients should be made frequently and used quickly. If you're batching cocktails for a party, your choice of sweetener affects how the batch will taste over time—simple syrup remains stable, while more complex syrups might change flavor or separate.",
  tips: ["1:1 simple syrup is the standard for most cocktails; 2:1 (rich) simple syrup for spirit-forward drinks where you want body", "Honey syrup adds richness and complexity—perfect for Whiskey Sours and Daiquiris where you want luxury", "Demerara syrup brings subtle molasses notes—beautiful in Old Fashioneds and tropical cocktails", "Real orgeat, made from almonds, transforms a Sour into something special—it's worth making or buying quality bottled versions", "Real grenadine (made from pomegranate juice) is essential for Negronis and tiki drinks—cheap grenadine ruins them"],
  usedIn: ["all"]
}];
const COCKTAIL_HISTORY = [{
  id: "golden-age",
  name: "The Golden Age",
  period: "1800s-1910s",
  icon: "🎩",
  summary: "The era when bartending became a craft, cocktails were systematized, and the foundation of modern mixology was established.",
  content: "The Golden Age of cocktails emerged in the mid-1800s when bartending transformed from simple pouring into something approaching an art form. This was the era of the professional bartender—\"Professor\" bartenders who guarded their recipes jealously and built reputations on their skill. The first printed cocktail recipes appeared in this period, most notably in Jerry Thomas's seminal 1862 work, \"How to Mix Drinks, or the Bon Vivant's Companion,\" which is often considered the first professional bartender's guide ever published.\n\nJerry Thomas, known as the \"Professor,\" is arguably the most important figure in cocktail history. He wasn't just a bartender; he was a celebrity, a showman, and a systematizer. He traveled the world, worked in famous establishments, and documented cocktail recipes at a time when most bartenders considered their recipes proprietary secrets. His book legitimized bartending as a profession and created the first standard recipes for classic cocktails like the Old Fashioned, the Martini, and the Manhattan. Thomas understood that cocktails weren't random mixtures but carefully balanced formulas, and his work elevated the entire profession.\n\nThe Old Fashioned, which emerged during this period, is perhaps the perfect symbol of the Golden Age. It's the original cocktail—spirit, sugar, bitters, water, ice—stripped down to its essentials and balanced to perfection. The drink requires skill to make correctly; it demands understanding of dilution, balance, and technique. In many ways, mastering the Old Fashioned is mastering the entire philosophy of the Golden Age: that cocktails should be spirit-forward, properly diluted, and balanced through technique rather than through complexity.\n\nThis era also saw the rise of the cocktail bar as an institution. Famous establishments like the Waldorf-Astoria, the Delmonico's Bar, and Jerry Thomas's own bars became destinations for anyone serious about drinking well. These weren't clubs or restaurants with bars attached; they were temples of cocktail craft. Bartenders were celebrated, their methods were discussed and debated, and the standards for what made a good cocktail were being established.",
  keyDrinks: ["old-fashioned", "manhattan", "martini", "sazerac"],
  keyFigures: ["Jerry Thomas", "Harry Craddock"],
  keyInnovation: "The professionalization and systematization of bartending; the first published cocktail recipes and professional bar guides; the concept of the cocktail as a balanced formula rather than random mixture"
}, {
  id: "prohibition",
  name: "Prohibition & the Speakeasy Era",
  period: "1920-1933",
  icon: "🥃",
  summary: "The era when American cocktail culture was nearly destroyed by law, forcing innovation and adaptation—and creating some of the most creative cocktails ever invented.",
  content: "Prohibition was a disaster for American cocktail culture. When the 18th Amendment made the production and sale of alcohol illegal in 1920, the entire infrastructure of American bartending collapsed overnight. The great bars closed, professional bartenders were suddenly unemployable, and the quality of available spirits plummeted. The bootleggers and smugglers who supplied speakeasies and illegal bars cared nothing for quality; they cut spirits with water, mixed bathtub gin, and produced brandy and rum that was often toxic.\n\nBut necessity breeds invention. Because the spirits available during Prohibition were so terrible—harsh, rough, undrinkable neat—bartenders were forced to be creative. They couldn't rely on quality ingredients, so they invented cocktails that masked the horrible flavor of cheap, cut spirits. The Daiquiri, the Sidecar, the Cosmopolitan-style drinks with heavy citrus and sugar to hide the rough booze—these cocktails were born from desperation. Ironically, many of these \"mask the bad liquor\" cocktails became classics that survive today, though modern versions are made with quality spirits rather than bootleg swill.\n\nProhibition also scattered American bartenders across the globe. Many fled to Europe—Paris, London, Berlin—where they established bars and continued their craft. Others went to Cuba and the Caribbean, where rum was still freely available and American tourists with money could still find a decent drink. This diaspora actually enriched the global cocktail scene; American bartending influence spread worldwide, and European and Caribbean techniques filtered back to influence American bartenders who remained (or returned after Repeal).\n\nThe Savoy Hotel in London became a sort of exile community for American bartenders during Prohibition. The Savoy's bartenders, many of them Americans who'd fled the United States, created some of the most enduring cocktails of this era. Harry Craddock, the Savoy's head bartender, published \"The Savoy Cocktail Book\" in 1930, a comprehensive guide documenting hundreds of cocktails and establishing standards that influence bartenders to this day.\n\nSpeakeasies themselves became cultural institutions—illegal bars hidden behind unmarked doors, accessible only to people who knew the right person or said the right password. They were glamorous and dangerous, and they attracted a different crowd than the old bars had. The Golden Age bars were mostly gentlemen's establishments; speakeasies were more democratic, attracting artists, writers, musicians, and socialites looking for excitement and transgression.\n\nWhen Prohibition ended in 1933, American bartending had to rebuild from rubble. The knowledge had been dispersed, the professional infrastructure was gone, and many of the old bars never reopened. But the cocktails that survived Prohibition—the ones that were good even when made with bootleg spirits—became the modern canon of classic cocktails. In a dark way, Prohibition created the cocktails we still drink today.",
  keyDrinks: ["daiquiri", "sidecar", "cosmopolitan"],
  keyFigures: ["Harry Craddock", "Exiled American bartenders in Europe and Cuba"],
  keyInnovation: "Cocktails designed to mask low-quality spirits; the global dispersal of American bartending knowledge; the codification of cocktail recipes in Harry Craddock's Savoy book; the cultural mythology of speakeasies as glamorous transgression"
}, {
  id: "tiki-era",
  name: "The Tiki Era",
  period: "1930s-1960s",
  icon: "🌺",
  summary: "The explosion of tropical escapism and rum-focused creativity that reinvented cocktail culture as entertainment, spectacle, and imagination.",
  content: "The Tiki era emerged during the Great Depression and flourished through the post-World War II period as a response to economic hardship and the desire for escapism. In 1933, Don the Beachcomber (Ernest Beaumont Gantt) opened his first tiki bar in Los Angeles, inspired by Caribbean and Polynesian aesthetics. Don's genius was understanding that people didn't just want a drink; they wanted an experience, an escape, a fantasy of tropical paradise. His bars featured bamboo décor, exotic masks and statues, tiki-style glassware, and most importantly, an entirely new category of cocktails built around rum and elaborate presentation.\n\nDon the Beachcomber's innovation was the rum-focused cocktail, often built from multiple rums blended together and combined with fresh fruit juices, syrups, and spices. His most famous creation, the Mai Tai, became the defining cocktail of the era—though its origins are disputed and have sparked decades of argument among tiki enthusiasts. Trader Vic (Victor Jules Bergeron), who opened his own Polynesian restaurant and bar in the 1930s, became Tiki's other great innovator. Trader Vic and Don the Beachcomber built competing empires of tiki bars and restaurants, each claiming to have invented the Mai Tai, each pushing the boundaries of what a tropical cocktail could be.\n\nThe Tiki era represented the original craft cocktail movement, even though nobody called it that at the time. Bartenders were obsessed with quality ingredients—fresh lime and lemon juice, fresh pineapple juice, cream of coconut, complex syrups. They experimented with rum blending, combining two, three, or even four different rums in a single drink to create layers of flavor and complexity. The presentation was theatrical and elaborate: drinks served in ceramic tiki mugs, garnished with fresh pineapple, orchids, and elaborate arrangements of fruit. The experience was immersive—you didn't just drink; you traveled to an imagined paradise.\n\nThe Mai Tai is the central symbol of this era. Don and Trader Vic both claimed to have invented it, and the debate continues to this day. What matters more than who invented it is what the Mai Tai represents: rum blended for complexity, fresh citrus, quality ingredients, and a commitment to craft. The classic version features light rum and aged rum, lime juice, orgeat, and a float of Jamaican rum on top. It's a drink that could not have been created without the innovations and obsessions of the Tiki era.\n\nThe Tiki era also brought frozen drinks, tropical fruit-based cocktails, and the concept of the cocktail as visual spectacle. Bartenders experimented with crushed ice, elaborate presentations, and the theatrical use of fire (flaming garnishes, flaming drinks). Some of this was kitsch, some of it was genuine craft, and the best tiki bars and bartenders managed to be both simultaneously—entertaining and excellent.\n\nBy the 1960s, Tiki culture had become mainstream enough to seem dated to younger drinkers. The aesthetics that had felt exotic and escapist in the 1940s felt tired and kitschy by the 1960s. The pendulum swung away from Tiki, and tropical cocktails became associated with cheap, mass-produced drinks and low-quality spirits. It took decades for Tiki to be revived and appreciated as a serious, sophisticated form of cocktail craft.",
  keyDrinks: ["mai-tai", "zombie", "hurricane", "painkiller"],
  keyFigures: ["Don the Beachcomber", "Trader Vic"],
  keyInnovation: "Rum blending for complexity; fresh juices and quality ingredients in tropical cocktails; the cocktail as theatrical presentation and immersive experience; the concept of the tiki bar as destination and escape fantasy; frozen cocktails and crushed-ice presentations"
}, {
  id: "dark-ages",
  name: "The Dark Ages",
  period: "1970s-1990s",
  icon: "🌙",
  summary: "The era when cocktail culture reached its nadir—cheap ingredients, artificial mixes, and the near-extinction of bartending craft.",
  content: "The 1970s through 1990s were genuinely dark times for cocktail culture. The decline had started in the 1960s, but by the 1970s it was in full swing. Quality spirits became expensive while sour mix and pre-made cocktail bases became cheap and ubiquitous. Chain restaurants and hotels standardized their drink menus using commercial mixes, processed fruit juices, and bottom-shelf spirits. The concept of the craft bartender disappeared, replaced by bartenders who were essentially vending machines—they could make a Daiquiri if you asked, but they'd make it from sour mix and cheap rum, producing something closer to a flavored slurpee than a cocktail.\n\nThe Cosmopolitan, invented in the 1980s, is a perfect symbol of this era. It's not a bad cocktail—a well-made Cosmo with quality vodka, Cointreau, fresh lime juice, and cranberry juice is actually quite good. But the Cosmo was also the poster child for the degradation of cocktail standards. It was ubiquitous in bars, it was often made badly (with sour mix instead of lime juice, with artificial cranberry \"juice\"), and it became the archetypal cocktail of the era—colorful, sweet, designed more for marketing than for flavor. When bartenders saw someone order a Cosmo, they didn't think \"craft cocktail\"; they thought \"easy drink for someone who doesn't know what they're doing.\"\n\nThe Long Island Iced Tea, created in the 1970s, is another emblematic drink of the Dark Ages. It's a monstrosity—seven different spirits, three liqueurs, sour mix, sweet & sour mix, cola—designed to pack as much alcohol into one drink as possible while tasting as little like alcohol as possible. It's the opposite of balance, the opposite of craft, the opposite of everything the Golden Age and Tiki era stood for. Yet it became hugely popular, especially in chain bars and tourist destinations.\n\nThis era saw the rise of theme restaurants and casual dining chains, which devastated local bar culture. Olive Garden, Applebee's, TGI Friday's—these establishments employed bartenders trained in corporate-standardized recipes using commercial mixes. The restaurants printed their recipes in binders, and bartenders followed them exactly. There was no innovation, no craft, no understanding of why a cocktail was balanced the way it was. You couldn't ask for something slightly different; you got what was in the manual.\n\nThe spirits industry also suffered. Bourbon, rye, and quality spirits fell out of fashion in favor of vodka, which was marketed as \"pure\" and \"neutral.\" The idea that a quality spirit should have flavor and character became almost radical. Vodka's neutrality was presented as a virtue, and cocktails were designed around mixers and juices rather than around spirits. Quality bartenders watched this happen with horror, but they were increasingly irrelevant—the market had moved on.\n\nDuring this nadir, the knowledge of cocktail craft nearly disappeared. The old bartenders who'd learned from Jerry Thomas's successors retired without passing on their knowledge. Books on cocktail technique went out of print. The cocktail was reduced to a vehicle for whatever marketing gimmick or trend was popular—neon-colored drinks, shots, Jägerbombs, and other indignities. The word \"cocktail\" meant something entirely different in 1990 than it had meant in 1910.",
  keyDrinks: ["cosmopolitan", "long-island-iced-tea", "fuzzy-navel", "sex-on-the-beach"],
  keyFigures: ["Corporate bartenders, chain restaurant beverage directors"],
  keyInnovation: "Commercial sour mix and pre-made cocktail bases; industrial-scale standardization; marketing-driven drink creation; the complete divorce of bartending from craft and expertise"
}, {
  id: "craft-revival",
  name: "The Craft Revival",
  period: "2000s-2010s",
  icon: "🎓",
  summary: "The rediscovery of pre-Prohibition cocktails, the rise of skilled bartenders as professionals, and the resurrection of bartending as a serious craft.",
  content: "The Craft Revival began quietly in the early 2000s, driven by a handful of bartenders who were obsessed with cocktail history and quality. These were people who'd read old cocktail books, studied Jerry Thomas and Harry Craddock, and decided that the Dark Ages of sour mix and artificial juices needed to end. They started making cocktails from scratch—fresh lime juice squeezed by hand, simple syrup made in their own kitchens, quality spirits selected carefully rather than ordered from whatever distributor was cheapest.\n\nDale DeGroff, often called the \"King of Cocktails,\" was one of the central figures of this revival. DeGroff had worked in theme restaurants during the Dark Ages but became obsessed with cocktail history and technique. He began studying old recipes, experimenting with techniques, and pushing back against the standardization and mediocrity he saw in commercial bartending. His book \"The Craft of the Cocktail,\" published in 2002, became a manifesto for the revival—it documented pre-Prohibition recipes, explained technique and theory, and made the case that bartending could be an art form worthy of serious study.\n\nSasha Petraske, who opened Milk & Honey in New York in 2000, became the symbol of a different strain of the revival. Milk & Honey was deliberately obscure—no sign on the door, hidden location, no cocktail menu. You arrived, told the bartender what spirits and flavors you liked, and they made something for you. This was bartending as craft, as conversation, as collaboration. Milk & Honey became the most influential bar of the 2000s because it rejected everything the Dark Ages had stood for: it had no marketing, no artificial sweetness, no commercial mixes, no theme. It was just excellent cocktails made with care and intention.\n\nDeath & Co, which opened in New York in 2006, brought the speakeasy aesthetic and serious craft cocktails to a venue that was more accessible than Milk & Honey. Death & Co became famous for their house cocktails—they created new drinks alongside classics, and they trained their bartenders to understand not just recipes but principles: dilution, balance, how different spirits behave, how to taste and adjust. They published a book, \"Death & Co: Modern Cocktails,\" that influenced a generation of bartenders.\n\nThe Craft Revival also meant returning to fresh ingredients and understanding what mattered: fresh-squeezed lime and lemon juice, house-made syrups and bitters, quality spirits, proper technique. It meant small ice, proper dilution, and understanding why a drink was balanced the way it was. Bartenders began studying books, tasting spirits intentionally, and practicing techniques until they became second nature. The speakeasy revival—bars with no signs, hidden locations, emphasis on craft and craftsmanship—became the aesthetic and practical model for the best bars.\n\nThis era also saw the rise of bartending competitions and professional organizations. The World Class competition, the Diageo World Class competition, and others created forums where bartenders could showcase skill and innovation. These competitions drove standards upward and created a sense of bartending as a profession with real expertise and standards.\n\nBy the 2010s, the Craft Revival had won. Quality spirits were cool again, fresh juice was standard, and the idea that a bartender should understand dilution and balance was no longer radical. Young bartenders came up in this era learning from people who'd studied cocktail history and understood technique. The knowledge that had nearly disappeared during the Dark Ages was being recovered and transmitted to new generations.",
  keyDrinks: ["daiquiri", "manhattan", "negroni", "old-fashioned"],
  keyFigures: ["Dale DeGroff", "Sasha Petraske", "Death & Co bartenders", "Pegu Club team"],
  keyInnovation: "Fresh juices and house-made ingredients; the return to pre-Prohibition recipes and techniques; the speakeasy aesthetic and hidden-location bars; bartending competitions and professional standards; the concept of bartending as a serious craft profession"
}, {
  id: "modern-era",
  name: "The Modern Era",
  period: "2010s-Present",
  icon: "🔬",
  summary: "The current age of experimentation, sustainability, and democratization—where cocktail craft continues to evolve while becoming more accessible globally.",
  content: "The Modern Era builds on the Craft Revival's foundation while pushing in new directions. The core principles—fresh juice, quality spirits, understanding dilution and balance—are now baseline standards at any bar that considers itself serious. But modern bartenders are also innovating in ways that would have been unthinkable even 10 years ago.\n\nThe low-ABV movement has been significant. Rather than assuming that cocktails need to be spirit-heavy and powerful, modern bartenders are exploring drinks with lower alcohol content but equal complexity. Aperol Spritz, which seemed like a curiosity in 2005, is now ubiquitous. Vermouth-forward cocktails and wine-based aperitifs have become cool. Bartenders are exploring how to build balance and complexity without relying on high-proof spirits as the foundation.\n\nMezcal's explosion is another defining feature of the modern era. Tequila was always part of cocktail culture, but mezcal was relatively unknown outside Mexico until the 2010s. The smoky, complex character of mezcal opened entirely new possibilities for cocktail creation. Mezcal cocktails have become a category unto themselves, with bartenders pushing to understand how mezcal's smoky character interacts with other ingredients.\n\nTechnical innovation has also defined this era. Clarified cocktails—drinks that look transparent but contain all the flavor of a cloudy drink—became possible through new techniques like centrifugation and clarification with milk or oil. Fat-washing, where a spirit is infused with fat from bacon or butter, became a legitimate technique used in restaurants and bars. Spherification, where cocktail ingredients are transformed into liquid-filled spheres, made an appearance. Some of these techniques are gimmicks, some are genuinely useful, but they represent the ongoing experimentation and innovation that defines modern bartending.\n\nSustainability has become an explicit concern. Bartenders are thinking about waste, about using whole fruits and vegetables rather than throwing away parts, about sourcing spirits responsibly. Some bars have moved to all-house-made ingredients; others have created zero-waste programs. This ties back to the original principles of craft—caring about quality and intent extends to caring about impact.\n\nThe democratization of good drinks has been perhaps the most important shift. In the Craft Revival era, great cocktails were available only at high-end bars in major cities. Now, knowledge is available to anyone with an internet connection. Home bartenders can access the same books, the same techniques, the same ingredient knowledge as professional bartenders. The gap between home bartending and professional bartending has narrowed dramatically. This hasn't killed professional bartending; instead, it's raised the baseline of what bartenders are expected to know and be able to do.\n\nGlobally, bartending has diversified. The American cocktail tradition is now one tradition among many. Bartenders in Europe, Asia, and other regions are developing their own cocktail cultures, drawing on local spirits and ingredients while engaging with the global cocktail conversation. A Japanese bartender might be exploring whisky cocktails using Japanese whisky; a Mexican bartender might be creating innovative mezcal drinks; a Scandinavian bartender might be exploring aquavit-based creations.\n\nThe Modern Era is still ongoing, and its definitive characteristics are still being written. But it's clear that cocktail culture is now robust enough to sustain multiple approaches simultaneously: traditional, experimental, high-end, accessible, global, local. The Dark Ages feel impossibly distant.",
  keyDrinks: ["low-abv-aperitifs", "mezcal-cocktails", "modern-classics"],
  keyFigures: ["Contemporary bartenders at Dante, Analogue, Employees Only, and hundreds of other craft bars worldwide"],
  keyInnovation: "Low-ABV movement; mezcal as a cocktail spirit; clarified and centrifuged cocktails; fat-washing and spherification; sustainability and zero-waste bartending; the democratization of cocktail knowledge; global diversification of cocktail culture"
}];

// ========== SHARE HANDLER ==========
async function handleShare(cocktail, variation, photoDataUrl) {
  const text = `${cocktail.name} — ${variation.name}\n\n` + variation.spec.join("\n") + `\n\nGlass: ${variation.glass || "Any"}\nMethod: ${variation.method || "Stir"}\nGarnish: ${variation.garnish || "None"}` + (variation.ratioNotes ? `\n\nRatio Notes: ${variation.ratioNotes}` : "") + `\n\nShared from Good Spirits`;
  if (navigator.share) {
    const shareData = {
      title: cocktail.name + " — " + variation.name,
      text
    };
    // If we have a photo, try to share it as a file
    if (photoDataUrl) {
      try {
        const response = await fetch(photoDataUrl);
        const blob = await response.blob();
        const file = new File([blob], "cocktail.jpg", {
          type: "image/jpeg"
        });
        if (navigator.canShare && navigator.canShare({
          files: [file]
        })) {
          shareData.files = [file];
        }
      } catch {}
    }
    try {
      await navigator.share(shareData);
    } catch {}
  } else {
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text);
      alert("Recipe copied to clipboard!");
    } catch {}
  }
}
