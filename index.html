<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Good Spirits">
    <title>Good Spirits</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Good%20Spirits%22%2C%22short_name%22%3A%22Cocktails%22%2C%22description%22%3A%22The%20home%20mixologist%27s%20bible%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22theme_color%22%3A%22%231a1a2e%22%2C%22background_color%22%3A%22%231a1a2e%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20192%20192%27%3E%3Crect%20fill%3D%27%231a1a2e%27%20width%3D%27192%27%20height%3D%27192%27%20rx%3D%2732%27%2F%3E%3Ctext%20x%3D%2796%27%20y%3D%27130%27%20font-size%3D%27120%27%20text-anchor%3D%27middle%27%20font-family%3D%27system-ui%27%3E%F0%9F%8D%B8%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192' rx='32'/><text x='96' y='130' font-size='120' text-anchor='middle' font-family='system-ui'>🍸</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192' rx='32'/><text x='96' y='130' font-size='120' text-anchor='middle' font-family='system-ui'>🍸</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1c2a4a;
            --bg-surface: #0f3460;
            --accent-gold: #c9a96e;
            --accent-gold-light: #e0c992;
            --accent-gold-dim: #a08550;
            --accent-amber: #d4a053;
            --accent-copper: #b87333;
            --text-primary: #f0e6d3;
            --text-secondary: #a09880;
            --text-dim: #6b6355;
            --border: #2a2a4a;
            --border-light: #3a3a5a;
            --success: #6bbd7b;
            --warning: #e8a87c;
            --error: #e07070;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        html, body {
            width: 100%; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            -webkit-overflow-scrolling: touch;
            -webkit-font-smoothing: antialiased;
        }
        #root { width: 100%; min-height: 100vh; }
        .app-container {
            display: flex; flex-direction: column; min-height: 100vh;
            max-width: 480px; margin: 0 auto; background: var(--bg-dark);
        }
        .app-header {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #16213e 100%);
            padding: 16px 20px 12px; position: sticky; top: 0; z-index: 50;
            border-bottom: 1px solid var(--border);
        }
        .app-header h1 { font-size: 22px; font-weight: 700; color: var(--accent-gold); letter-spacing: 0.5px; }
        .app-header .subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }
        .app-content { flex: 1; padding-bottom: 90px; overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.25s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: 72px; background: #111128;
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; align-items: stretch; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; color: var(--text-dim);
            background: none; border: none; font-size: 11px; gap: 3px;
            transition: color 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .nav-item.active { color: var(--accent-gold); }
        .nav-icon { font-size: 22px; }
        .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .card {
            background: var(--bg-card); border-radius: var(--radius-md); padding: 16px;
            margin: 10px 16px; border: 1px solid var(--border); transition: all 0.2s; cursor: pointer;
        }
        .card:active { transform: scale(0.98); background: var(--bg-card-hover); }
        .btn {
            padding: 10px 18px; border-radius: var(--radius-sm); border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: var(--accent-gold); color: var(--bg-dark); }
        .btn-primary:active { background: var(--accent-gold-dim); transform: scale(0.98); }
        .btn-secondary { background: var(--border); color: var(--text-primary); }
        .btn-secondary:active { background: var(--border-light); transform: scale(0.98); }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .btn-outline { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); }
        .btn-outline:active { background: rgba(201,169,110,0.15); }
        .pill-row {
            display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .pill-row::-webkit-scrollbar { display: none; }
        .pill {
            flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .pill.active { background: var(--accent-gold); color: var(--bg-dark); border-color: var(--accent-gold); font-weight: 600; }
        .search-bar { margin: 12px 16px 4px; position: relative; }
        .search-bar input {
            width: 100%; padding: 10px 16px 10px 40px; border-radius: var(--radius-md);
            border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none;
        }
        .search-bar input:focus { border-color: var(--accent-gold); }
        .search-bar input::placeholder { color: var(--text-dim); }
        .search-bar .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-dim); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border); border-bottom: none;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 16px; color: var(--accent-gold);
            position: sticky; top: 0; background: var(--bg-card); z-index: 10;
        }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px; }
        .modal-body { padding: 16px 20px 32px; }
        .section-header { padding: 16px 16px 8px; font-size: 13px; font-weight: 700; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1.5px; }
        .cocktail-card { display: flex; align-items: center; gap: 14px; }
        .cocktail-card .spirit-icon {
            width: 44px; height: 44px; border-radius: 10px; background: rgba(201,169,110,0.12);
            display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
        }
        .cocktail-card .cocktail-info { flex: 1; min-width: 0; }
        .cocktail-card .cocktail-name { font-size: 15px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cocktail-card .cocktail-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .cocktail-card .variation-count { font-size: 11px; color: var(--accent-gold-dim); background: rgba(201,169,110,0.1); padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; margin: 2px 4px 2px 0; }
        .tag-spirit { background: rgba(201,169,110,0.15); color: var(--accent-gold); }
        .tag-style { background: rgba(107,189,123,0.15); color: var(--success); }
        .tag-era { background: rgba(224,168,124,0.15); color: var(--warning); }
        .tag-mood { background: rgba(160,152,128,0.15); color: var(--text-secondary); }
        .variation-card { background: rgba(15,52,96,0.3); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
        .variation-card.canon { border-color: var(--accent-gold-dim); background: rgba(201,169,110,0.06); }
        .variation-name { font-size: 15px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .canon-badge { font-size: 10px; background: var(--accent-gold); color: var(--bg-dark); padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .spec-list { list-style: none; padding: 10px 0; }
        .spec-list li { padding: 4px 0; font-size: 14px; color: var(--text-primary); display: flex; align-items: baseline; gap: 8px; }
        .spec-list li::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--accent-gold); flex-shrink: 0; margin-top: 7px; }
        .detail-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .detail-label { font-size: 11px; font-weight: 700; color: var(--accent-gold-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .detail-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .ratio-notes { font-size: 13px; color: var(--accent-gold-light); line-height: 1.6; font-style: italic; background: rgba(201,169,110,0.06); padding: 10px 12px; border-radius: var(--radius-sm); border-left: 3px solid var(--accent-gold-dim); }
        .bar-category { margin: 8px 16px; }
        .bar-category-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .bar-category-title { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .bar-category-count { font-size: 12px; color: var(--text-dim); }
        .bar-items { padding: 0 0 8px; }
        .bar-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .bar-item:active { background: rgba(201,169,110,0.08); }
        .bar-item-name { font-size: 14px; color: var(--text-primary); }
        .bar-item-essential { font-size: 10px; color: var(--accent-gold); background: rgba(201,169,110,0.12); padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
        .bar-toggle { width: 44px; height: 26px; border-radius: 13px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
        .bar-toggle.on { background: var(--accent-gold); }
        .bar-toggle::after { content: ""; width: 22px; height: 22px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
        .bar-toggle.on::after { transform: translateX(18px); }
        .match-section { margin: 0 16px 12px; }
        .match-header { font-size: 13px; font-weight: 700; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .match-card:active { background: var(--bg-card-hover); }
        .match-pct { font-size: 18px; font-weight: 700; color: var(--success); min-width: 44px; text-align: center; }
        .match-pct.partial { color: var(--warning); }
        .match-info { flex: 1; }
        .match-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .match-missing { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .technique-card { display: flex; align-items: center; gap: 14px; }
        .technique-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(201,169,110,0.12); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .technique-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .technique-summary { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .technique-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; white-space: pre-line; }
        .tip-list { list-style: none; padding: 12px 0; }
        .tip-list li { padding: 6px 0 6px 20px; position: relative; font-size: 13px; color: var(--text-primary); line-height: 1.5; }
        .tip-list li::before { content: "\u2605"; position: absolute; left: 0; color: var(--accent-gold); font-size: 11px; }
        .era-card { display: flex; gap: 14px; align-items: flex-start; }
        .era-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(224,168,124,0.12); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .era-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .era-period { font-size: 12px; color: var(--accent-gold-dim); margin-top: 1px; }
        .era-summary { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .era-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; white-space: pre-line; }
        .key-drinks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .key-drink-pill { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(201,169,110,0.1); color: var(--accent-gold); cursor: pointer; }
        .batch-controls { padding: 16px; }
        .batch-input-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .batch-input-row label { font-size: 14px; color: var(--text-secondary); min-width: 80px; }
        .batch-input-row input, .batch-input-row select { flex: 1; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-dark); color: var(--text-primary); font-size: 14px; font-family: inherit; }
        .batch-result { background: rgba(201,169,110,0.06); border: 1px solid var(--accent-gold-dim); border-radius: var(--radius-md); padding: 16px; margin-top: 12px; }
        .batch-result-header { font-size: 14px; font-weight: 700; color: var(--accent-gold); margin-bottom: 10px; }
        .batch-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
        .batch-item:last-child { border-bottom: none; }
        .batch-item-name { color: var(--text-secondary); }
        .batch-item-amount { color: var(--text-primary); font-weight: 600; }
        .fav-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; transition: transform 0.15s; -webkit-tap-highlight-color: transparent; }
        .fav-btn:active { transform: scale(1.2); }
        .star-rating { display: flex; gap: 4px; }
        .star { font-size: 20px; cursor: pointer; color: var(--border-light); transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
        .star.filled { color: var(--accent-gold); }
        .cocktail-hero { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .cocktail-hero-icon { font-size: 48px; margin-bottom: 8px; }
        .cocktail-hero-name { font-size: 24px; font-weight: 700; color: var(--accent-gold); }
        .cocktail-hero-meta { font-size: 13px; color: var(--text-secondary); margin-top: 6px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .cocktail-hero-history { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-top: 12px; padding: 0 8px; font-style: italic; }
        .cocktail-hero-actions { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
        .sub-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; overflow-x: auto; }
        .sub-tab { padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--text-dim); border: none; background: none; cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
        .sub-tab.active { color: var(--accent-gold); }
        .sub-tab.active::after { content: ""; position: absolute; bottom: -1px; left: 16px; right: 16px; height: 2px; background: var(--accent-gold); border-radius: 1px; }
        .counter-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; border-radius: 9px; background: var(--accent-gold); color: var(--bg-dark); font-size: 10px; font-weight: 700; padding: 0 5px; margin-left: 4px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state-text { font-size: 14px; line-height: 1.6; }
        .buy-next { background: rgba(107,189,123,0.08); border: 1px solid rgba(107,189,123,0.2); border-radius: var(--radius-md); padding: 14px 16px; margin: 12px 16px; }
        .buy-next-header { font-size: 13px; font-weight: 700; color: var(--success); margin-bottom: 6px; }
        .buy-next-item { font-size: 13px; color: var(--text-secondary); padding: 3px 0; }
        .buy-next-unlock { font-size: 11px; color: var(--text-dim); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .divider { height: 1px; background: var(--border); margin: 8px 16px; }

/* Ratio Stepper */
.stepper-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
}
.stepper-ingredient {
    flex: 1;
    font-size: 14px;
    color: var(--text-primary);
}
.stepper-controls {
    display: flex;
    align-items: center;
    gap: 6px;
}
.stepper-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--accent-gold-dim);
    background: transparent;
    color: var(--accent-gold);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
}
.stepper-btn:active {
    background: var(--accent-gold);
    color: var(--bg-dark);
}
.stepper-amount {
    min-width: 54px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-gold);
}
.stepper-unit {
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 50px;
}
.save-variation-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--accent-gold-dim);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
}
.save-variation-bar input {
    flex: 1;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-dark);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
}
.modified-badge {
    font-size: 10px;
    background: var(--warning);
    color: var(--bg-dark);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
}
.custom-badge {
    font-size: 10px;
    background: #7c5cbf;
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
}

/* Remix / Edit form */
.remix-form {
    padding: 16px 20px;
}
.remix-ingredient-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}
.remix-ingredient-row input {
    flex: 1;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-dark);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
}
.remix-ingredient-row .amount-input {
    width: 70px;
    flex: none;
}
.remix-remove-btn {
    width: 28px; height: 28px;
    border-radius: 50%;

elops a slightly sour taste from excessive aeration, and loses the elegant simplicity that makes those drinks special. The rule is simple: if the drink has citrus, dairy, egg, or cordials, shake it. If it's just spirits and bitters, stir it. Finally, make sure your shaker is actually cold when you begin. Many bartenders don't pre-chill their shakers; they just start shaking room-temperature metal and wonder why the drink isn't as cold as it should be.\n\nThe Regal Shake is a technique popularized by bartender Sasha Petraske: shake hard and fast for exactly 10 seconds, not more, not less. This creates optimal dilution and temperature without over-aerating. If you're making a drink with egg white, however, you'll want that extra dry shake first to build proper structure. The science behind shaking is really about three things happening simultaneously: the ice is melting and cooling the liquid, the shaker walls are transferring cold to the mix, and the motion itself is breaking down and emulsifying the ingredients. All three need to happen in concert.",

sugar, a few dashes of Angostura bitters, and a splash of water, you muddle these three ingredients together until the sugar is partially dissolved and the bitters are evenly distributed. This takes 10-15 seconds of gentle, controlled pressing—you're not trying to turn the sugar into a paste, just breaking down the crystals enough to distribute them and begin their dissolution in the small amount of water. Then you add your spirit and ice, and the residual heat and continued stirring finish the dissolving process. The sugar should remain slightly grainy at the bottom of the glass; that's actually a sign you've done it right. If you've ground it into a smooth paste, you've muddled too hard.",

  content: "Building is the unglamorous cousin of stirring and shaking, yet it's fundamental to understanding how cocktails are constructed. A built drink is simply one that's assembled directly in the glass you'll serve it in, without a shaker or mixing glass. This technique dominates a huge category of drinks: highballs, long drinks, G&Ts, Dark 'n' Stormys, and countless others. The method is simple, but the details matter.\n\nThe foundational principle is ice-first. Fill your glass with ice before adding any liquid. Why? Because when you pour spirit first and then add ice, the ice will displace the liquid, water will splash, and you'll have an uneven drink. Ice first creates a stable platform for your spirit and mixers to cascade into. After ice, the typical order is spirit, then secondary ingredients (vermouth, liqueur, or bitters), then mixer. For a G&T, that means ice first, gin second, tonic last. For a Daiquiri built in the glass (though this is uncommon), you'd do ice, light rum, lime juice, then simple syrup—though honestly, most daiquiris should be shaken. The critical thing is to always build with cold, quality ingredients and cold glassware.\n\nOne often-overlooked aspect of building is the difference between different ice strategies. A highball made with large format ice (one big cube, or two medium cubes) will dilute slowly and elegantly, keeping your drink cold and spirit-forward for the entire drinking experience. A highball made with standard-sized ice will dilute faster, creating a sweeter, more mixed final product. Neither is wrong, but it's a decision you should make intentionally. Some bartenders use the crushed-ice technique for built drinks served in tin cups or tiki glasses, which creates a more refreshing, frost-forward presentation.\n\nThe build technique also allows you to adjust as you go. You can taste the spirit and mixer together, adjust the ratio slightly, add a touch more bitters or citrus juice, and then top with ice and the final mixer. This flexibility is one reason why experienced bartenders often build rather than shake or stir. The downside is that you don't get the emulsification and consistency of a shaken drink, and you're creating dilution as you build, not all at once. For drinks that need precise balance, shaking is still superior. But for simple, refreshing long drinks, building is both practical and elegant.",

the fruit into pulp before it's had a chance to add flavor. Flash-blending—blending in short, intense bursts—is a technique used in professional bars to preserve texture and minimize dilution, and it's worth practicing at home.\n\nOne final consideration: sugar and sweetness in frozen drinks. Because frozen drinks melt throughout the drinking experience, they become progressively more dilute and less sweet. Slightly over-sweeten your base liquid before blending to account for this. A frozen daiquiri that tastes perfectly balanced in the first sip will taste sour and weak by the final sip if you haven't accounted for this dilution arc. This is also why fresh lime juice is non-negotiable in frozen daiquiris—bottled lime juice will taste increasingly bitter as it dilutes.",

  content: "Swizzling is one of the most visually distinctive and historically rooted techniques in cocktail craft, yet it's almost entirely absent from modern home bartending. The technique originates in the Caribbean, where it was developed as an elegant alternative to shaking before mechanical cocktail shakers became widely available. A swizzle stick—traditionally made from a pronged branch of the Quararibea tree, modern versions typically featuring four prongs or a twisted design—is held vertically between the palms of your hands and rotated rapidly while submerged in the drink.\n\nThe mechanics are surprisingly effective. As you rotate the swizzle stick in a rapid figure-eight or back-and-forth motion (like you're starting a fire with a bow drill), the prongs or twisted sections disturb the ice and liquid, creating rapid chilling and aeration without the violence of a shaker. The technique traditionally takes 15-20 seconds, and you'll know you're done when the glass develops a thick frost on the outside and the liquid becomes visibly thicker. The drink ends up with a silky texture and a slight aeration that falls somewhere between a stirred drink and a shaken one.\n\nSwizzling is particularly associated with Caribbean rum drinks, especially the Swizzle itself (rum, lime juice, simple syrup, bitters, and ice), but it works beautifully for any drink you'd build in the glass—which, logically, includes highballs and long drinks. The advantage over stirring is that you get more aeration and a faster chill; the advantage over shaking is that you maintain elegance and control, and you can adjust the drink as you go. The disadvantage is that swizzle sticks are hard to find in most Western bars and homes, and the technique takes practice to execute properly.\n\nThe technique remains essential in tiki culture and in Caribbean bartending traditions, and it's worth learning if you want to understand the full spectrum of cocktail techniques. Even without a proper swizzle stick, you can approximate the motion with a long bar spoon: hold it vertically, keep the bowl submerged, and rapidly oscillate it back and forth while also rotating slightly. It's not quite the same as a proper swizzle, but it captures the general principle. The cultural significance of swizzling also matters—it's a living link to pre-Prohibition bartending traditions and Caribbean ingenuity, a reminder that mixing techniques evolved in different places and cultures before becoming standardized in the modern bar.",

  id: "ice",

  icon: "🧊",
  summary: "The overlooked foundation of cocktail quality—choosing and using the right ice shape and size transforms the drinking experience.",
  content: "Ice is not a neutral ingredient. The shape, size, and clarity of ice directly affects dilution rate, temperature, presentation, and ultimately the quality of your final drink. Yet it's the most ignored element of home bartending. Most people just use whatever ice cubes come out of their freezer tray and think nothing of it. This is a mistake.\n\nLet's start with the basics: larger ice melts slower than smaller ice. A single large cube melts gradually and predictably, creating a slow dilution arc that keeps your drink spirit-forward throughout the drinking experience. Standard cubes (about one inch) melt faster and create more surface area for dilution. Crushed or pebble ice melts very quickly, useful for drinks where you want rapid chilling and a refreshing, watered-down final product. A one-ounce block of ice (sometimes called a \"large format\" or \"boulder\" ice) is the gold standard for spirit-forward drinks because it melts so slowly that you can nurse a cocktail for 20+ minutes and it will remain properly balanced at the end. For Negronis, Martinis, and spirit-forward cocktails in general, always use the largest ice you can access.\n\nThe shape also matters because it affects how ice sits in the glass and how liquid flows around it. A perfectly clear ice sphere is beautiful and creates a showstopping presentation, but it also melts slower than a cube of the same weight because of the reduced surface area. Crystal-clear ice is a luxury—most home freezers create cloudy ice because impurities and dissolved gases in tap water crystallize first, pushing those impurities toward the center of the ice cube. If clear ice matters to you (and it does in an elegant Martini), you'll need to invest in a clear-ice maker or use a technique like directional freezing, which involves freezing ice in a cooler with careful water circulation to force impurities to freeze last.\n\nFor home bartenders, the practical hierarchy is this: large, clear cubes beat standard cubes; standard cubes beat crushed ice (except in drinks specifically designed for crushed ice); crushed ice beats small ice every time. If you can access one-ounce ice cubes or spheres from a local bartending supply company, do it. They're cheap and transform your cocktails. If you can't, at least invest in a good ice maker that produces larger cubes than your standard freezer tray. For frozen drinks and tropical preparations, crushed ice is essential, and if you don't have an ice crusher, many bartenders simply put standard ice cubes in a sturdy plastic bag and crush them with a bar mallet or rolling pin.\n\nOne final consideration: ice temperature matters. Ice fresh from a home freezer is typically around 0°F, while ice from a commercial freezer (drier air, more consistent temperatures) might be 10-15°F colder. Warm ice melts faster and doesn't chill as efficiently. If you're making drinks and your ice seems to be melting quickly or your cocktails aren't getting as cold as they should, your ice is probably not cold enough. Some bartenders keep a dedicated ice bucket in the deepest part of their freezer to keep ice colder longer.",

  id: "garnish",
  name: "Garnish",
  icon: "🍋",
  summary: "The visual and aromatic component that elevates a cocktail from good to memorable—far more than decoration.",
  content: "A garnish is not a garnish is not a garnish. The difference between a thoughtfully chosen and properly executed garnish and an afterthought piece of fruit is the difference between a complete cocktail experience and an incomplete one. Garnishes serve multiple purposes: they provide aroma (essential oils from expressed citrus), they provide flavor (the oils and fruit flesh), they provide textural contrast (fresh herbs, candied elements), and they provide visual communication about what you're about to drink.\n\nLet's start with expressed citrus peels, the most common and versatile garnish. An expressed peel is simply a citrus skin that has been twisted or folded to release the oils in the peel directly into or over the drink. The technique is to take a vegetable peeler or channel knife and cut a thin strip of peel (avoiding as much white pith as possible), then hold it over the drink and twist it sharply so the oils spray across the surface. You can flame the oils by holding the peel over a lit match so the oils ignite briefly, creating a moment of heat and caramelization, or you can skip the flame and simply drop the expressed peel into the drink or leave it on the rim. The flamed expression is more theatrical and adds a subtle bitter-caramel note; the unflamed expression is cleaner and lets the citrus character shine. For a Martini or Negroni, an expressed lemon twist is essential—the oils are the entire point, and the peel itself should either be dropped in or left on the rim, never discarded.\n\nCitrus wheels and halves are primarily visual—they're beautiful and communicate what you're drinking—but they also provide flavor if the drinker bites into them. A fresh lime wheel in a Margarita or Daiquiri should be thin enough to bite through easily (about 1/8 inch) and should be cut from a fresh, unblemished lime. Pre-cut garnishes left sitting in the bar look tired and impart nothing but appearance. Dehydrated citrus wheels, by contrast, are purely visual and aromatic—they're dried slices that last for weeks and add a beautiful burnished appearance to a drink without the freshness component. Use them for aesthetic purposes or for drinks where you want a subtle citrus aroma without the juice component.\n\nFresh herbs—mint, basil, rosemary, thyme—require careful handling. A slapped mint sprig is prepared by holding the mint gently in one hand and striking it sharply against the palm of your other hand, just hard enough to release the aromatic oils without tearing the leaves. This broken mint is then placed on top of the drink or on the rim, and the aroma immediately perfumes the entire drink. Some bartenders skip the slapping and simply tear a small leaf and place it on the drink—this works but is less aromatic. Rosemary sprigs work beautifully as garnishes for spirit-forward drinks; thyme for herbal cocktails; basil for fresh, citrus-forward drinks. Never muddle herb garnishes unless the recipe specifically calls for it; once on top of the drink, they're there for aroma and aesthetics, not to be crushed into the liquid.\n\nCocktail cherries have undergone a revolution in recent years. For decades, cheap maraschino cherries (those radioactive-red things) were the standard garnish in mass-market cocktails. Today, the industry standard for serious bartenders is Luxardo maraschino cherries, which are actually made from a European cherry preserved in a light maraschino syrup. They're significantly more expensive than cheap maraschino cherries, but they're also infinitely better—they have actual cherry flavor, a pleasant texture, and a sophisticated appearance. If you're making cocktails at home, Luxardo is the only option worth considering. Olives are another garnish category entirely—a martini is traditionally garnished with an olive (usually three on a cocktail pick), and the style of martini (dirty martini, regular martini) affects how the olive is treated. Gin typically goes with green olives; vodka with your choice of green or a pearl onion (which makes it a Gibson instead).\n\nRimming is the practice of coating the rim of your glass with salt, sugar, spice, or other flavoring ingredients. Salt rims are traditional for Margaritas, Palomas, and other tequila drinks; sugar rims for sours and tiki drinks; spice blends like Tajín (a chili-lime seasoning) for modern variations. The technique is to dampen the rim with lime juice or egg white, then dip the dampened rim into your seasoning ingredient (spread in a shallow dish), coating evenly. A well-executed rim adds both flavor and visual appeal; a poorly executed rim with uneven coating looks sloppy. Some modern bartenders use a thin layer of honey or simple syrup as the adhesive instead of citrus or egg white, which creates a sweeter rim.\n\nThe final category is textural and visual: candied ginger for tropical drinks, cinnamon sticks for warm cocktails, coffee beans floating on top of an Espresso Martini, a curl of chocolate shaving on a dessert cocktail. These garnishes work best when they're visible, aromatic, and complementary to the drink's flavor profile. Don't garnish just for the sake of garnishing; choose elements that tell a story about what the drinker is about to experience.",
  tips: ["Expressed citrus peels are essential for spirit-forward drinks—the oils are not optional, they're fundamental to the drink's aromatic profile", "Slap mint gently between your palms to release oils before placing on the drink; don't muddle it into oblivion", "Use Luxardo maraschino cherries, not the cheap radioactive-red variety—the difference is night and day", "Citrus wheels should be thin (about 1/8 inch) and cut fresh from unblemished fruit; pre-cut garnishes look tired", "Dampen the rim with fresh citrus juice or egg white, not just water, so the seasoning actually adheres"],
